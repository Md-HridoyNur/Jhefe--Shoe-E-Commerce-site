<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhefe | Official Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">JHEFE</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#shop">Shop</a>
            <a href="#">About</a>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>Official Merchandise</h1>
            <p>Get the exclusive collection from the latest season.</p>
            <a href="#shop" class="btn">Shop Now</a>
        </div>
    </header>

    <!-- Product Grid -->
    <section id="shop" class="container">
        <h2>Featured Products</h2>
        <div class="filter-btns">
            <button class="filter-btn active" onclick="filterProducts('all')">All</button>
            <button class="filter-btn" onclick="filterProducts('casual')">Casual</button>
            <button class="filter-btn" onclick="filterProducts('skate')">Skate</button>
            <button class="filter-btn" onclick="filterProducts('high-tops')">High-Tops</button>
        </div>
        <div id="product-grid" class="product-grid">
            <!-- Products injected via JS -->
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <span class="close-btn" onclick="toggleCart()">&times;</span>
            <h2>Your Cart</h2>
            <div id="cart-items">
                <p>Your cart is empty.</p>
            </div>
            <div class="cart-footer">
                <h3>Total: $<span id="cart-total">0.00</span></h3>
                <button class="btn checkout-btn" onclick="checkout()">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Newsletter Section -->
    <section class="newsletter">
        <div class="newsletter-content">
            <h2>Join the Crew</h2>
            <p>Subscribe for exclusive drops and early access.</p>
            <form onsubmit="event.preventDefault(); alert('Subscribed!');">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit" class="btn">Subscribe</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2023 The Show. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
